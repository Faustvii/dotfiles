- defaults:
    link:
      create: true
      force: false # set to true when rerunning to update links after changes

- clean: ["~", "~/.config"]

- link:
    # ── Git ───────────────────────────────────────────────────────
    ~/.gitconfig:

    # ── Zsh ───────────────────────────────────────────────────────
    ~/.zshenv: .zshenv
    ~/.config/zsh/.zprofile: .config/zsh/.zprofile
    ~/.config/zsh/.zshrc: .config/zsh/.zshrc
    ~/.config/zsh/aliases.zsh: .config/zsh/aliases.zsh
    ~/.config/shell/alias: .config/shell/alias
    ~/.config/shell/vars: .config/shell/vars

    # ── Prompt ────────────────────────────────────────────────────
    ~/.config/starship.toml: .config/starship.toml

    # ── Terminal ──────────────────────────────────────────────────
    ~/.config/kitty/: .config/kitty/

    # ── Desktop / WM ──────────────────────────────────────────────
    ~/.config/i3/: .config/i3/
    ~/.config/polybar/: .config/polybar/
    ~/.config/rofi/: .config/rofi/
    ~/.config/picom: .config/picom/
    ~/.config/dunst/dunstrc: .config/dunst/dunstrc

    # ── Audio ─────────────────────────────────────────────────────
    ~/.config/easyeffects/input: .config/easyeffects/input
    ~/.config/easyeffects/output: .config/easyeffects/output
    ~/.config/easyeffects/irs: .config/easyeffects/irs
    ~/.config/wireplumber/wireplumber.conf.d/: .config/wireplumber/wireplumber.conf.d/

    # ── Apps ──────────────────────────────────────────────────────
    ~/.config/discord/settings.json: .config/discord/settings.json
    ~/.config/MangoHud/: .config/MangoHud/
    ~/.config/hexchat/colors.conf: .config/hexchat/colors.conf
    #   ~/.config/discover_overlay/config.ini: .config/discover_overlay/config.ini

    # ── VS Code ───────────────────────────────────────────────────
    ~/.config/Code/User/:
      create: true
      glob: true
      path: config/Code/User/*.json

    # ── Systemd ───────────────────────────────────────────────────
    ~/.config/systemd/user/monitor-configs.service: monitor-configs.service

    # ── Scripts ───────────────────────────────────────────────────
    ~/sync.sh:
    ~/preventScreensaver.sh:

    # ── X11 ───────────────────────────────────────────────────────
    ~/Xresources:

- shell:
    - [git submodule update --init --recursive, Installing submodules]
    - [install -d -m 700 ~/.local/share/gnupg, Creating XDG GnuPG home]
    - [
        install -d -m 700 ~/.local/state/keychain && chmod -R go-rwx ~/.local/state/keychain,
        Securing keychain state dir,
      ]
    - [
        systemctl --user enable monitor-configs.service,
        Enabling monitor service,
      ]
    - [systemctl --user start monitor-configs.service, Starting monitor service]
